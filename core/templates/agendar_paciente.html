{% extends 'base_ubs.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Regulação</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href="{% static 'assets/styles/agenda.css' %}">
    <link rel="icon" type="image/png" href="{% static 'assets/img/logo_img.jpeg' %}">
</head>

<body>
    <!----------------------- MAIN ----------------------->
    <main class="main">
        <section class="section-agenda">
            <div class="agenda-container">
                <div class="agenda-card">
                    <div class="agenda-header">
                        <h2>Agendar Paciente - {{ agenda.especialidade }} ({{ agenda.data }})</h2>
                    </div>
                    <div class="agenda-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="form-group">
                                <input type="text" name="nome" placeholder="Nome" required>
                            </div>
                            <div class="form-group">
                                <input type="text" name="sus" placeholder="Cartão SUS" required>
                            </div>
                            <div class="form-group">
                                <input type="text" name="telefone" placeholder="Telefone" required>
                            </div>
                            <div class="form-group">
                                <input type="text" name="agente" placeholder="Agente de saúde" required>
                            </div>
                            <div class="form-group">
                                <select name="ubs" required>
                                    {% for u in ubs %}
                                    <option value="{{ u.0 }}">{{ u.1 }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Agendar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="{% static 'assets/js/agendar_paciente.js' %}"></script>
</body>

</html>

{% endblock %}
